<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>The Redaction Act</title>
    <link rel="stylesheet" href="popup.css">
    <script src="knockout.js"></script>
    <script src="knockout-secure-binding.js"></script>
    <script src="popup.js"></script>
</head>

<body>
    <!-- Header -->
    <div class="header">
        <img class="header__icon" src="icon_on.png" alt="">
        <span class="header__title">The Redaction Act</span>
    </div>

    <div class="content">
        <!-- Site status + toggle -->
        <div class="status">
            <div class="status__text">
                <div class="status__label">
                    <span class="status__dot" data-bind="css: { 'status__dot--on': filterEnabled }"></span>
                    <span data-bind="text: statusLabel"></span>
                </div>
                <div class="status__domain" data-bind="text: currentDomain"></div>
            </div>
            <button class="switch" type="button" role="switch"
                data-bind="click: toggleFilter, css: { 'switch--on': filterEnabled }, attr: { 'aria-checked': filterEnabled }">
                <span class="switch__thumb"></span>
            </button>
        </div>

        <!-- Keywords header -->
        <div class="section-head">
            <span class="section-head__title">Keywords</span>
            <span class="count" data-bind="text: keywordCount"></span>
        </div>

        <!-- Add keyword -->
        <form class="input-row" data-bind="submit: addKeyword">
            <input class="input" type="text" placeholder="Add keyword(s)…" data-bind="value: newKeyword">
            <button class="add-btn" type="submit" title="Add" aria-label="Add keyword">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                </svg>
            </button>
        </form>

        <div class="hint">
            Whole words match (incl. plurals). Use a space for phrases, or prefix
            <code>~</code> for loose substring matching. Separate multiple with commas.
        </div>

        <!-- Keyword chips (click anywhere on a pill to remove it) -->
        <div class="chips" data-bind="visible: hasKeywords">
            <!-- ko foreach: keywords -->
            <span class="chip" title="Click to remove" data-bind="click: $parent.removeKeyword">
                <span class="chip__label" data-bind="text: $data"></span>
                <span class="chip__remove" aria-hidden="true">✕</span>
            </span>
            <!-- /ko -->
        </div>

        <!-- Empty state -->
        <div class="empty" data-bind="visible: isEmpty">
            <div class="empty__title">No keywords yet</div>
            <div class="empty__sub">Add a word above to start hiding matching content.</div>
        </div>
    </div>
</body>

</html>
